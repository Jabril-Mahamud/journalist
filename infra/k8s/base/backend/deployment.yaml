apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: journalist
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: journalist-backend:dev
        imagePullPolicy: IfNotPresent
        ports:
          - name: http
            containerPort: 8001
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        envFrom:
          - configMapRef:
              name: backend-config
          - secretRef:
              name: backend-secret
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3