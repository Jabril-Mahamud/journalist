apiVersion: v1
kind: Service
metadata:
    name: frontend
spec:
    selector:
        app: frontend
    ports:
      - port: 3001
        targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: frontend
spec:
    replicas: 1
    selector:
        matchLabels:
            app: frontend
    template:
        metadata:
            labels:
                app: frontend
        spec:
            containers:
              - name: frontend
                image: journalist-frontend:latest
                imagePullPolicy: Never
                ports:
                  - containerPort: 3001
                env:
                  - name: NEXT_PUBLIC_API_URL
                    value: "http://backend:8001"
