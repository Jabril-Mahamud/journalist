apiVersion: v1
kind: Service
metadata:
    name: frontend
spec:
    type: {{ .Values.frontend.serviceType | default "ClusterIP" }}
    selector:
        app: frontend
    ports:
      - port: 3001
        targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: frontend
spec:
    replicas: 1
    selector:
        matchLabels:
            app: frontend
    template:
        metadata:
            labels:
                app: frontend
        spec:
            containers:
              - name: frontend
                image: {{ .Values.frontend.image }}:{{ .Values.frontend.tag }}
                imagePullPolicy: Always
                ports:
                  - containerPort: 3001
                env:
                  - name: NEXT_PUBLIC_API_URL
                    value: {{ .Values.frontend.apiUrl | default "http://localhost:8001" | quote }}
                  - name: CLERK_SECRET_KEY
                    valueFrom:
                      secretKeyRef:
                        name: journalist-secrets
                        key: CLERK_SECRET_KEY
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    cpu: 300m
                    memory: 384Mi
                readinessProbe:
                  tcpSocket:
                    port: 3001
                  initialDelaySeconds: 10
                  periodSeconds: 10
                livenessProbe:
                  tcpSocket:
                    port: 3001
                  initialDelaySeconds: 15
                  periodSeconds: 15
