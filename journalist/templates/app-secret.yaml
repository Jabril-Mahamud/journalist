apiVersion: v1
kind: Secret
metadata:
    name: journalist-secrets
    labels:
        app.kubernetes.io/managed-by: Helm
    annotations:
        meta.helm.sh/release-name: {{ .Release.Name }}
        meta.helm.sh/release-namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
    CLERK_JWKS_URL: {{ .Values.clerk.jwks_url | default "" | quote }}
    CLERK_SECRET_KEY: {{ .Values.clerk.secret_key | default "" | quote }}
    ALLOWED_ORIGINS: {{ .Values.cors.allowed_origins | default "http://localhost:3001" | quote }}
