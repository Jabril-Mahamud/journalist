apiVersion: v1
kind: Service
metadata:
    name: backend
spec:
    type: {{ .Values.backend.serviceType | default "ClusterIP" }}
    selector:
        app: backend
    ports:
      - port: 8001
        targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: backend
spec:
    replicas: 1
    selector:
        matchLabels:
            app: backend
    template:
        metadata:
            labels:
                app: backend
        spec:
            containers:
              - name: backend
                image: {{ .Values.backend.image }}:{{ .Values.backend.tag }}
                imagePullPolicy: Always
                ports:
                  - containerPort: 8001
                envFrom:
                  - secretRef:
                      name: journalist-secrets
                  - secretRef:
                      name: postgres-credentials

              {{- if .Values.cloudsql.enabled }}
              - name: cloud-sql-proxy
                image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
                args:
                  - "--structured-logs"
                  - "--port=5432"
                  - {{ .Values.cloudsql.instanceConnectionName | quote }}
                securityContext:
                  runAsNonRoot: true
                resources:
                  requests:
                    memory: "64Mi"
                    cpu: "50m"
              {{- end }}