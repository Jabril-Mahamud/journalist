apiVersion: v1
kind: Service
metadata:
    name: backend
spec:
    selector:
        app: backend
    ports:
      - port: 8001
        targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: backend
spec:
    replicas: 1
    selector:
        matchLabels:
            app: backend
    template:
        metadata:
            labels:
                app: backend
        spec:
            containers:
              - name: backend
                image: journalist-backend:latest
                imagePullPolicy: Never
                ports:
                  - containerPort: 8001
                env:
                  - name: POSTGRES_USER
                    valueFrom:
                        secretKeyRef:
                            name: postgres-credentials
                            key: POSTGRES_USER
                  - name: POSTGRES_PASSWORD
                    valueFrom:
                        secretKeyRef:
                            name: postgres-credentials
                            key: POSTGRES_PASSWORD
                  - name: POSTGRES_DB
                    valueFrom:
                        secretKeyRef:
                            name: postgres-credentials
                            key: POSTGRES_DB
