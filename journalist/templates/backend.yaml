apiVersion: apps/v1
kind: Deployment
metadata:
    name: backend
spec:
    replicas: 1
    selector:
        matchLabels:
            app: backend
    template:
        metadata:
            labels:
                app: backend
        spec:
            containers:
              - name: backend
                image: {{ .Values.backend.image }}:{{ .Values.backend.tag }}
                imagePullPolicy: Always
                ports:
                  - containerPort: 8001
                envFrom:
                  - secretRef:
                      name: journalist-secrets
                  - secretRef:
                      name: postgres-credentials

