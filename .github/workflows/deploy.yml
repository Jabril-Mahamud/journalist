name: Deploy

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  # ─────────────────────────────────────────────
  # Lint & type-check (runs on every PR + push)
  # ─────────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements/prod.txt

      - name: Install dependencies
        run: pip install -r requirements/prod.txt

      - name: Check syntax
        run: python -m compileall -q -x '__pycache__' .

  # ─────────────────────────────────────────────
  # Run backend tests inside Docker
  # ─────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test stage and run pytest
        run: |
          docker build \
            --target test \
            --tag journalist-backend-test \
            ./backend

  # ─────────────────────────────────────────────
  # Deploy to Civo via GHCR
  # Push to dev  → dev namespace  (dev.writejrnl.uk)
  # Push to main → prod namespace (writejrnl.uk)
  # ─────────────────────────────────────────────
  lint-helm:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Helm chart
        run: |
          helm lint ./journalist \
            --values journalist/values.yaml \
            --values journalist/values.dev.yaml

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend, test-backend, lint-helm]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "namespace=prod" >> $GITHUB_OUTPUT
            echo "api_url=https://writejrnl.uk/api" >> $GITHUB_OUTPUT
            echo "values_file=journalist/values.prod.yaml" >> $GITHUB_OUTPUT
            echo "release=journalist-prod" >> $GITHUB_OUTPUT
          else
            echo "namespace=dev" >> $GITHUB_OUTPUT
            echo "api_url=https://dev.writejrnl.uk/api" >> $GITHUB_OUTPUT
            echo "values_file=journalist/values.dev.yaml" >> $GITHUB_OUTPUT
            echo "release=journalist-dev" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        run: |
          docker build \
            -t ghcr.io/${{ steps.env.outputs.repo }}/backend:${{ github.sha }} \
            ./backend
          docker push ghcr.io/${{ steps.env.outputs.repo }}/backend:${{ github.sha }}

      - name: Build and push frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.env.outputs.api_url }} \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }} \
            -t ghcr.io/${{ steps.env.outputs.repo }}/frontend:${{ github.sha }} \
            ./frontend
          docker push ghcr.io/${{ steps.env.outputs.repo }}/frontend:${{ github.sha }}

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.CIVO_KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Helm deploy
        run: |
          helm upgrade --install ${{ steps.env.outputs.release }} ./journalist \
            --namespace ${{ steps.env.outputs.namespace }} \
            --create-namespace \
            --wait --timeout 5m \
            --values journalist/values.yaml \
            --values ${{ steps.env.outputs.values_file }} \
            --set backend.image=ghcr.io/${{ steps.env.outputs.repo }}/backend \
            --set backend.tag=${{ github.sha }} \
            --set frontend.image=ghcr.io/${{ steps.env.outputs.repo }}/frontend \
            --set frontend.tag=${{ github.sha }}
