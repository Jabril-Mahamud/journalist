name: Deploy

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  # ─────────────────────────────────────────────
  # Lint & type-check (runs on every PR + push)
  # ─────────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements/prod.txt

      - name: Install dependencies
        run: pip install -r requirements/prod.txt

      - name: Check syntax
        run: python -m compileall -q -x '__pycache__' .

  # ─────────────────────────────────────────────
  # Run backend tests inside Docker
  # ─────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test stage and run pytest
        run: |
          docker build \
            --target test \
            --tag journalist-backend-test \
            ./backend

  # ─────────────────────────────────────────────
  # Deploy to GKE
  # Push to dev  → dev namespace  (dev.writejrnl.uk)
  # Push to main → prod namespace (writejrnl.uk)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend, test-backend]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "namespace=prod" >> $GITHUB_OUTPUT
            echo "api_url=https://writejrnl.uk" >> $GITHUB_OUTPUT
            echo "values_file=journalist/values.prod.yaml" >> $GITHUB_OUTPUT
            echo "release=journalist-prod" >> $GITHUB_OUTPUT
          else
            echo "namespace=dev" >> $GITHUB_OUTPUT
            echo "api_url=https://dev.writejrnl.uk" >> $GITHUB_OUTPUT
            echo "values_file=journalist/values.dev.yaml" >> $GITHUB_OUTPUT
            echo "release=journalist-dev" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker europe-west2-docker.pkg.dev

      - name: Build and push backend
        run: |
          docker build \
            -t europe-west2-docker.pkg.dev/journalist-490612/journalist/backend:${{ github.sha }} \
            ./backend
          docker push europe-west2-docker.pkg.dev/journalist-490612/journalist/backend:${{ github.sha }}

      - name: Build and push frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.env.outputs.api_url }} \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }} \
            -t europe-west2-docker.pkg.dev/journalist-490612/journalist/frontend:${{ github.sha }} \
            ./frontend
          docker push europe-west2-docker.pkg.dev/journalist-490612/journalist/frontend:${{ github.sha }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: journalist
          location: europe-west2-b
          project_id: journalist-490612

      - name: Helm deploy
        run: |
          helm upgrade --install ${{ steps.env.outputs.release }} ./journalist \
            --namespace ${{ steps.env.outputs.namespace }} \
            --values journalist/values.yaml \
            --values ${{ steps.env.outputs.values_file }} \
            --set backend.tag=${{ github.sha }} \
            --set frontend.tag=${{ github.sha }}